name: CMake

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}...HEAD" -- "*.cc" "*.hh")
          else
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD -- "*.cc" "*.hh")
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "No C++ files changed; skipping format check."
            exit 0
          fi

          echo "Checking formatting for:"
          echo "$CHANGED_FILES"
          echo "$CHANGED_FILES" | xargs clang-format --dry-run --Werror

  build:
    needs: format
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_type: Release
          - os: ubuntu-latest
            build_type: Debug
          - os: macos-latest
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Install libraries (Linux)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: sudo apt-get install -y cmake libasio-dev

      - name: Install libraries (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          brew install asio libiconv

          cat << EOF > nproc
          #!/bin/sh
          sysctl -n hw.logicalcpu
          EOF
          chmod a+x nproc
          sudo cp nproc /usr/local/bin/nproc
          rm -f nproc

      - name: Install phosg
        run: |
          git clone https://github.com/fuzziqersoftware/phosg.git
          cd phosg
          cmake .
          make -j $(nproc)
          sudo make install

      - name: Install resource_file
        run: |
          git clone https://github.com/fuzziqersoftware/resource_dasm.git
          cd resource_dasm
          cmake .
          make -j $(nproc)
          sudo make install

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.build_type}}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{matrix.build_type}} -j $(nproc)

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest -C ${{matrix.build_type}} --output-on-failure --test-output-size-failed 200000
